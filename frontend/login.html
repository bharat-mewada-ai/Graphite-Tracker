<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EcoTrack Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #f5f7f2;
      --forest-green: #1b4332;
      --forest-green-hover: #2d6a4f;
      --text-dark: #1b4332;
      --text-muted: #678c7c;
      --card-bg: #ffffff;
      --border-color: #e2e8e4;
      --error: #e74c3c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-main);
      color: #2c3e50;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(27, 67, 50, 0.05);
      text-align: center;
    }

    .logo-area {
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background-color: #52be80;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 12px auto;
    }

    .logo-area h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .logo-area p {
      font-size: 13px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #d5dbdb;
      background-color: #f8f9f9;
      color: #34495e;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      border-color: #52be80;
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(82, 190, 128, 0.1);
    }

    .btn-submit {
      background-color: var(--forest-green);
      color: white;
      padding: 12px;
      width: 100%;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s ease;
      margin-top: 10px;
    }

    .btn-submit:hover {
      background-color: var(--forest-green-hover);
      transform: translateY(-1px);
    }

    .alert {
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .alert-error {
      background-color: #fadbd8;
      border: 1px solid #f5b7b1;
      color: #78281f;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-area">
      <div class="logo-icon">🍃</div>
      <h1>EcoTrack Portal</h1>
      <p>Graphite Higher Secondary School</p>
    </div>

    <div id="alert" class="alert alert-error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">School Email</label>
        <input type="email" id="email" required placeholder="e.g. admin@school.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
    </form>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    const form = document.getElementById('loginForm');
    const alertBox = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        window.location.href = 'index.html';
      } catch (err) {
        alertBox.textContent = err.message;
        alertBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
